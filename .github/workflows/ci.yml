name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Build
        run: cargo build --locked
      - name: Test
        run: cargo test --locked
      - name: Smoke (start/stop)
        shell: bash
        run: |
          DB_PATH=$(mktemp -d)/test.sqlite
          target/debug/clawketd --db "$DB_PATH" --port 0 &
          PID=$!
          sleep 3
          kill $PID || true
