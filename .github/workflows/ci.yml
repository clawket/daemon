name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt newer JS-action runtimes into Node 24 ahead of the 2026-09-16 forced cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust-build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --locked
      - name: Test
        run: cargo test --locked
      - name: Smoke (start/stop)
        shell: bash
        run: |
          DB_PATH=$(mktemp -d)/test.sqlite
          target/debug/clawketd --db "$DB_PATH" --port 0 &
          PID=$!
          sleep 3
          kill $PID || true
