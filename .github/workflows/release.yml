name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Publish to npm (skip if NPM_TOKEN unset)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set — skipping npm publish"
            exit 0
          fi
          pnpm publish --access public --no-git-checks
      - name: Package source tarball
        run: tar -czvf clawket-daemon-${GITHUB_REF_NAME}.tar.gz bin src migrations package.json README.md LICENSE
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            clawket-daemon-*.tar.gz
          generate_release_notes: true
